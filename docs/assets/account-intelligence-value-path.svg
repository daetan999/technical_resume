<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="650" viewBox="0 0 1600 650" role="img" aria-labelledby="title desc"><title id="title">AI infrastructure account intelligence value path</title><desc id="desc">A five-stage sales value path from account signals to a measurable proof of concept and a decision-ready business case.</desc><defs><linearGradient id="vbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#081019"/><stop offset="1" stop-color="#0F1926"/></linearGradient><filter id="vshadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity=".35"/></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#506178"/></marker></defs><rect width="1600" height="650" rx="24" fill="url(#vbg)"/><text x="80" y="78" fill="#8EDC3B" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800">VALUE PATH</text><text x="80" y="122" fill="#F5F7FA" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="800">How the workbench supports an AI-infrastructure deal</text><text x="80" y="156" fill="#AAB6C4" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">The application does not claim customer truth. It structures the hypotheses, evidence, and decisions a seller must validate.</text><g font-family="Inter,Segoe UI,Arial,sans-serif"><rect x="80" y="220" width="230" height="230" rx="16" fill="#111B28" stroke="#2B394C" filter="url(#vshadow)"/><rect x="98" y="240" width="38" height="28" rx="14" fill="#1A2B1D" stroke="#557E31"/><text x="117" y="259" fill="#B8FF72" font-size="9" font-weight="800" text-anchor="middle">01</text><text x="98" y="302" fill="#F5F7FA" font-size="18" font-weight="800">Frame the account</text><text x="98" y="330" fill="#AAB6C4" font-size="12"><tspan x="98">Signals, workloads,</tspan><tspan x="98" dy="17">constraints</tspan></text><line x1="98" y1="370" x2="292" y2="370" stroke="#2B394C"/><text x="98" y="394" fill="#8EDC3B" font-size="8" font-weight="800">COMMERCIAL VALUE</text><text x="98" y="418" fill="#E8EDF2" font-size="12" font-weight="650"><tspan x="98">Avoid generic product</tspan><tspan x="98" dy="17">pitching</tspan></text><line x1="320" y1="335" x2="373" y2="335" stroke="#506178" stroke-width="2" marker-end="url(#arrow)"/><rect x="385" y="220" width="230" height="230" rx="16" fill="#111B28" stroke="#2B394C" filter="url(#vshadow)"/><rect x="403" y="240" width="38" height="28" rx="14" fill="#1A2B1D" stroke="#557E31"/><text x="422" y="259" fill="#B8FF72" font-size="9" font-weight="800" text-anchor="middle">02</text><text x="403" y="302" fill="#F5F7FA" font-size="18" font-weight="800">Map the buying group</text><text x="403" y="330" fill="#AAB6C4" font-size="12"><tspan x="403">Economic, technical,</tspan><tspan x="403" dy="17">champion, gate</tspan></text><line x1="403" y1="370" x2="597" y2="370" stroke="#2B394C"/><text x="403" y="394" fill="#8EDC3B" font-size="8" font-weight="800">COMMERCIAL VALUE</text><text x="403" y="418" fill="#E8EDF2" font-size="12" font-weight="650">Expose missing access early</text><line x1="625" y1="335" x2="678" y2="335" stroke="#506178" stroke-width="2" marker-end="url(#arrow)"/><rect x="690" y="220" width="230" height="230" rx="16" fill="#111B28" stroke="#2B394C" filter="url(#vshadow)"/><rect x="708" y="240" width="38" height="28" rx="14" fill="#1A2B1D" stroke="#557E31"/><text x="727" y="259" fill="#B8FF72" font-size="9" font-weight="800" text-anchor="middle">03</text><text x="708" y="302" fill="#F5F7FA" font-size="18" font-weight="800">Quantify the hypothesis</text><text x="708" y="330" fill="#AAB6C4" font-size="12"><tspan x="708">Technical baseline +</tspan><tspan x="708" dy="17">business metric</tspan></text><line x1="708" y1="370" x2="902" y2="370" stroke="#2B394C"/><text x="708" y="394" fill="#8EDC3B" font-size="8" font-weight="800">COMMERCIAL VALUE</text><text x="708" y="418" fill="#E8EDF2" font-size="12" font-weight="650"><tspan x="708">Build a defensible value</tspan><tspan x="708" dy="17">case</tspan></text><line x1="930" y1="335" x2="983" y2="335" stroke="#506178" stroke-width="2" marker-end="url(#arrow)"/><rect x="995" y="220" width="230" height="230" rx="16" fill="#111B28" stroke="#2B394C" filter="url(#vshadow)"/><rect x="1013" y="240" width="38" height="28" rx="14" fill="#1A2B1D" stroke="#557E31"/><text x="1032" y="259" fill="#B8FF72" font-size="9" font-weight="800" text-anchor="middle">04</text><text x="1013" y="302" fill="#F5F7FA" font-size="18" font-weight="800">Design the PoC</text><text x="1013" y="330" fill="#AAB6C4" font-size="12"><tspan x="1013">Acceptance criteria,</tspan><tspan x="1013" dy="17">evidence, owner</tspan></text><line x1="1013" y1="370" x2="1207" y2="370" stroke="#2B394C"/><text x="1013" y="394" fill="#8EDC3B" font-size="8" font-weight="800">COMMERCIAL VALUE</text><text x="1013" y="418" fill="#E8EDF2" font-size="12" font-weight="650"><tspan x="1013">Prevent endless technical</tspan><tspan x="1013" dy="17">trials</tspan></text><line x1="1235" y1="335" x2="1288" y2="335" stroke="#506178" stroke-width="2" marker-end="url(#arrow)"/><rect x="1300" y="220" width="230" height="230" rx="16" fill="#111B28" stroke="#2B394C" filter="url(#vshadow)"/><rect x="1318" y="240" width="38" height="28" rx="14" fill="#1A2B1D" stroke="#557E31"/><text x="1337" y="259" fill="#B8FF72" font-size="9" font-weight="800" text-anchor="middle">05</text><text x="1318" y="302" fill="#F5F7FA" font-size="18" font-weight="800">Drive a decision</text><text x="1318" y="330" fill="#AAB6C4" font-size="12"><tspan x="1318">Decision date + next</tspan><tspan x="1318" dy="17">actions</tspan></text><line x1="1318" y1="370" x2="1512" y2="370" stroke="#2B394C"/><text x="1318" y="394" fill="#8EDC3B" font-size="8" font-weight="800">COMMERCIAL VALUE</text><text x="1318" y="418" fill="#E8EDF2" font-size="12" font-weight="650"><tspan x="1318">Advance, reshape, or</tspan><tspan x="1318" dy="17">disqualify</tspan></text><rect x="80" y="500" width="1445" height="92" rx="14" fill="#0C141E" stroke="#2B394C"/><text x="104" y="528" fill="#8EDC3B" font-size="9" font-weight="800">MEASURABLE PROOF POINTS</text><text x="104" y="554" fill="#F5F7FA" font-size="13" font-weight="750">GPU / cluster</text><text x="104" y="575" fill="#96A4B4" font-size="10">utilization · throughput · idle time</text><text x="384" y="554" fill="#F5F7FA" font-size="13" font-weight="750">Inference</text><text x="384" y="575" fill="#96A4B4" font-size="10">latency · tokens/sec · unit cost</text><text x="664" y="554" fill="#F5F7FA" font-size="13" font-weight="750">Networking</text><text x="664" y="575" fill="#96A4B4" font-size="10">bandwidth · collective performance · packet loss</text><text x="944" y="554" fill="#F5F7FA" font-size="13" font-weight="750">Data center</text><text x="944" y="575" fill="#96A4B4" font-size="10">rack density · PUE · time to capacity</text><text x="1224" y="554" fill="#F5F7FA" font-size="13" font-weight="750">Deal execution</text><text x="1224" y="575" fill="#96A4B4" font-size="10">buyer access · PoC decision · next step</text></g></svg>