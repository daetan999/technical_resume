<rect x="0" y="0" width="1500" height="772" rx="18" fill="#f2f5ea" stroke="#d8dfcd"/>
<text x="44" y="52" font-size="15" letter-spacing="4" fill="#5c6b60" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" font-weight="600">GPU FINOPS  ·  SERVING ECONOMICS</text>
<text x="1456" y="52" text-anchor="end" font-size="13" fill="#8a958b" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace">portfolio · dae tan</text>
<rect x="44" y="88" width="610" height="372" rx="14" fill="none" stroke="#a33a2a" stroke-width="1.4" opacity="0.55" stroke-dasharray="7 5"/>
<text x="62" y="115" font-size="12.5" letter-spacing="3" fill="#a33a2a" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" font-weight="600">BEFORE  ·  SINGLE-TENANT CPU FLEET</text>
<rect x="74" y="150" width="550" height="286" rx="14" fill="#ffffff" stroke="#d8dfcd"/>
<rect x="74" y="150" width="6" height="286" rx="3" fill="#a33a2a"/>
<text x="96" y="180" font-size="16" font-weight="700" fill="#16232e">100+ CPU pods — one per property</text>
<text x="96" y="200" font-size="12.5" fill="#5c6b60">bursty pricing traffic, provisioned for peak</text>
<text x="96" y="231" font-size="13" fill="#33413a">1 dedicated CPU instance per property model</text>
<text x="96" y="251" font-size="13" fill="#33413a">Idle ~95% of the time — demand is spiky</text>
<text x="96" y="271" font-size="13" fill="#33413a">Cost scales linearly with every property added</text>
<text x="96" y="291" font-size="13" fill="#33413a">No batching, no sharing, no elasticity</text>
<rect x="94" y="305" width="125" height="24" rx="7" fill="#fdf1ef"/>
<text x="104" y="322" font-size="11.5" fill="#a33a2a" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace">utilization ~5%</text>
<rect x="229" y="305" width="125" height="24" rx="7" fill="#fdf1ef"/>
<text x="239" y="322" font-size="11.5" fill="#a33a2a" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace">linear $ growth</text>
<rect x="846" y="88" width="610" height="372" rx="14" fill="none" stroke="#2e5d43" stroke-width="1.4" opacity="0.55" stroke-dasharray="7 5"/>
<text x="864" y="115" font-size="12.5" letter-spacing="3" fill="#2e5d43" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" font-weight="600">AFTER  ·  SHARED BATCHED GPU</text>
<rect x="876" y="150" width="550" height="286" rx="14" fill="#ffffff" stroke="#d8dfcd"/>
<rect x="876" y="150" width="6" height="286" rx="3" fill="#2e5d43"/>
<text x="898" y="180" font-size="16" font-weight="700" fill="#16232e">100+ models on one GPU cluster</text>
<text x="898" y="200" font-size="12.5" fill="#5c6b60">Triton dynamic batching · EKS · NVIDIA T4</text>
<text x="898" y="231" font-size="13" fill="#33413a">Requests buffered &lt;=10 ms into parallel batches</text>
<text x="898" y="251" font-size="13" fill="#33413a">Multi-model concurrency in shared GPU memory</text>
<text x="898" y="271" font-size="13" fill="#33413a">Property scaling decoupled from infra cost</text>
<text x="898" y="291" font-size="13" fill="#33413a">Absorbs 10x reservation-volume spikes</text>
<rect x="896" y="305" width="174" height="24" rx="7" fill="#eef2e4"/>
<text x="906" y="322" font-size="11.5" fill="#2e5d43" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace">utilization 5% -&gt; 80%+</text>
<rect x="1080" y="305" width="104" height="24" rx="7" fill="#eef2e4"/>
<text x="1090" y="322" font-size="11.5" fill="#2e5d43" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace">p99 &lt; 150 ms</text>
<polyline points="654,288 846,288" fill="none" stroke="#1b2733" stroke-width="2" marker-end="url(#arr)"/>
<rect x="701.0" y="259.0" width="98" height="21" rx="4" fill="#f2f5ea" opacity="0.92"/>
<text x="750.0" y="274.0" text-anchor="middle" font-size="13" fill="#1b2733" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace">consolidate</text>
<text x="750" y="322" text-anchor="middle" font-size="12" fill="#5c6b60" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace">dynamic batching</text>
<text x="750" y="340" text-anchor="middle" font-size="12" fill="#5c6b60" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace">+ shared GPU</text>
<rect x="44" y="500" width="335" height="138" rx="14" fill="#ffffff" stroke="#d8dfcd"/>
<rect x="44" y="500" width="335" height="6" rx="3" fill="#2e5d43"/>
<text x="211.5" y="580" text-anchor="middle" font-size="46" font-weight="800" fill="#2e5d43" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace">-58%</text>
<text x="211.5" y="614" text-anchor="middle" font-size="14" fill="#5c6b60">cloud hosting cost</text>
<rect x="403" y="500" width="335" height="138" rx="14" fill="#ffffff" stroke="#d8dfcd"/>
<rect x="403" y="500" width="335" height="6" rx="3" fill="#2e5d43"/>
<text x="570.5" y="580" text-anchor="middle" font-size="46" font-weight="800" fill="#2e5d43" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace">-$240K</text>
<text x="570.5" y="614" text-anchor="middle" font-size="14" fill="#5c6b60">annual cloud spend</text>
<rect x="762" y="500" width="335" height="138" rx="14" fill="#ffffff" stroke="#d8dfcd"/>
<rect x="762" y="500" width="335" height="6" rx="3" fill="#1b2733"/>
<text x="929.5" y="580" text-anchor="middle" font-size="46" font-weight="800" fill="#1b2733" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace">10x</text>
<text x="929.5" y="614" text-anchor="middle" font-size="14" fill="#5c6b60">traffic headroom</text>
<rect x="1121" y="500" width="335" height="138" rx="14" fill="#ffffff" stroke="#d8dfcd"/>
<rect x="1121" y="500" width="335" height="6" rx="3" fill="#1b2733"/>
<text x="1288.5" y="580" text-anchor="middle" font-size="46" font-weight="800" fill="#1b2733" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace">&lt;150 ms</text>
<text x="1288.5" y="614" text-anchor="middle" font-size="14" fill="#5c6b60">p99 inference SLA</text>
<text x="750" y="694" text-anchor="middle" font-size="13.5" fill="#33413a">Mechanism: dynamic batching raises GPU utilization, so one shared cluster replaces a linear CPU fleet —</text>
<text x="750" y="716" text-anchor="middle" font-size="13.5" fill="#33413a">unit cost per inference falls while throughput headroom rises. The FinOps win and the SLA win are the same move.</text>
<text x="750" y="748" text-anchor="middle" font-size="11.5" fill="#8a958b" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace">illustrative, portfolio-level figures — sanitized architectural blueprint</text>
</svg>
