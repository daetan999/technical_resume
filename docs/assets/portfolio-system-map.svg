<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Enterprise AI infrastructure portfolio system map</title>
  <desc id="desc">Three technical foundation blueprints feed a four-stage commercial workflow from opportunity discovery through capacity sizing, solution configuration, and TCO and ROI analysis, ending in a qualified decision.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#0d1b2d"/>
    </linearGradient>
    <linearGradient id="result" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#123b46"/><stop offset="1" stop-color="#173f35"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#58c4b8"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#02070d" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1600" height="900" rx="28" fill="url(#bg)"/>
  <path d="M0 112 H1600" stroke="#24364a"/>
  <text x="64" y="56" fill="#f5f8fb" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="28" font-weight="700">Enterprise AI Infrastructure Portfolio</text>
  <text x="64" y="88" fill="#91a4b8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="17">Technical understanding → commercial qualification → infrastructure decision</text>
  <text x="64" y="148" fill="#58c4b8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="2.4">LAYER A · TECHNICAL FOUNDATION</text>
  <g filter="url(#shadow)">
    <rect x="64" y="172" width="450" height="178" rx="18" fill="#111f31" stroke="#31506b"/>
    <rect x="575" y="172" width="450" height="178" rx="18" fill="#111f31" stroke="#31506b"/>
    <rect x="1086" y="172" width="450" height="178" rx="18" fill="#111f31" stroke="#31506b"/>
  </g>
  <rect x="64" y="172" width="7" height="178" rx="4" fill="#5b8def"/>
  <text x="92" y="212" fill="#8fb4ff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.6">INFRASTRUCTURE</text>
  <text x="92" y="249" fill="#f4f7fa" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="23" font-weight="700">Enterprise MLOps Platform</text>
  <text x="92" y="282" fill="#b3c0ce" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="16">GPU serving · model lifecycle · drift</text>
  <text x="92" y="311" fill="#b3c0ce" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="16">workload behavior · serving economics</text>
  <rect x="575" y="172" width="7" height="178" rx="4" fill="#53a7d8"/>
  <text x="603" y="212" fill="#7bc8f4" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.6">GOVERNED CLOUD</text>
  <text x="603" y="249" fill="#f4f7fa" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="23" font-weight="700">GCP Data &amp; Intelligence</text>
  <text x="603" y="282" fill="#b3c0ce" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="16">BigQuery · serverless services · IAM</text>
  <text x="603" y="311" fill="#b3c0ce" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="16">migration · reliability · operations</text>
