  <text x="846" y="600" fill="#b6c4d1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="15">requirements · rules · alternatives</text>
  <text x="846" y="628" fill="#b6c4d1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="15">risks · validation · architecture</text>
  <circle cx="1233" cy="524" r="17" fill="#1e6d72"/><text x="1233" y="530" text-anchor="middle" fill="#fff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700">4</text>
  <text x="1261" y="529" fill="#74ddd1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.2">QUANTIFY VALUE</text>
  <text x="1225" y="568" fill="#f4f7fa" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="21" font-weight="700">TCO &amp; ROI Workbench</text>
  <text x="1225" y="600" fill="#b6c4d1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="15">TCO · unit economics · payback</text>
