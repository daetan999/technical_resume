  <text x="467" y="628" fill="#b6c4d1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="15">confidence · sensitivity · PoC</text>
  <circle cx="854" cy="524" r="17" fill="#1e6d72"/><text x="854" y="530" text-anchor="middle" fill="#fff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700">3</text>
  <text x="882" y="529" fill="#74ddd1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.2">CONFIGURE</text>
