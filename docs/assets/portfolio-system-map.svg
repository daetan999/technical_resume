  <path d="M777 578 H814" stroke="#58c4b8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1156 578 H1193" stroke="#58c4b8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1368 666 V710 H800 V736" fill="none" stroke="#58c4b8" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="374" y="744" width="852" height="112" rx="22" fill="url(#result)" stroke="#4fb3a8" filter="url(#shadow)"/>
  <text x="800" y="790" text-anchor="middle" fill="#fff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="25" font-weight="700">Qualified Enterprise AI Infrastructure Decision</text>
  <text x="800" y="825" text-anchor="middle" fill="#aee8df" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="17">advance · reshape · nurture · disqualify</text>
