    <rect x="443" y="490" width="334" height="176" rx="18" fill="#132535" stroke="#2e6570"/>
    <rect x="822" y="490" width="334" height="176" rx="18" fill="#132535" stroke="#2e6570"/>
    <rect x="1201" y="490" width="334" height="176" rx="18" fill="#132535" stroke="#2e6570"/>
