  <text x="1114" y="212" fill="#bca5f5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.6">AI APPLICATION</text>
  <text x="1114" y="249" fill="#f4f7fa" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="23" font-weight="700">Agentic FP&amp;A Analytics</text>
  <text x="1114" y="282" fill="#b3c0ce" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="16">governed data · query controls · KPIs</text>
  <text x="1114" y="311" fill="#b3c0ce" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="16">model boundary · application risk</text>
