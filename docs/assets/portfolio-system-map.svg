  <path d="M1311 350 V389 H800" fill="none" stroke="#3c6d78" stroke-width="2"/>
  <path d="M800 404 V448" fill="none" stroke="#58c4b8" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="824" y="422" fill="#7dd8cf" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="14">credible technical discovery</text>
  <text x="64" y="464" fill="#58c4b8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="2.4">LAYER B · COMMERCIAL OPPORTUNITY WORKFLOW</text>
  <g filter="url(#shadow)">
