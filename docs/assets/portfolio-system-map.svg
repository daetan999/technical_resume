  <text x="124" y="529" fill="#74ddd1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.2">DISCOVER &amp; QUALIFY</text>
