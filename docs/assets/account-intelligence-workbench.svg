 font-weight="700">WEEK POC</text><rect x="95" y="280" width="435" height="600" rx="16" fill="url(#panel)" stroke="#2A374A"/><rect x="550" y="280" width="955" height="600" rx="16" fill="url(#panel)" stroke="#2A374A"/><text x="125" y="320" fill="#8EDC3B" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="800">INPUT</text><text x="125" y="352" fill="#F5F7FA" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23" font-weight="750">Build an account brief</text><text x="125" y="392" fill="#9DA9B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" font-weight="700">COMPANY</text><rect x="125" y="403" width="375" height="48" rx="8" fill="#090F17" stroke="#354258"/><text x="143" y="434" fill="#E9EEF4" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="550">NVIDIA — Accelerated-computing platform provider</text><text x="125" y="470" fill="#9DA9B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" font-weight="700">SOLUTION MOTION</text><rect x="125" y="481" width="375" height="48" rx="8" fill="#090F17" stroke="#354258"/><text x="143" y="512" fill="#E9EEF4" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="550">GPU Compute &amp; Accelerated Platforms</text><text x="125" y="548" fill="#9DA9B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" font-weight="700">CUSTOMER SEGMENT</text><rect x="125" y="559" width="375" height="48" rx="8" fill="#090F17" stroke="#354258"/><text x="143" y="590" fill="#E9EEF4" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="550">Enterprise</text><text x="125" y="626" fill="#9DA9B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" font-weight="700">REGION</text><rect x="125" y="637" width="375" height="48" rx="8" fill="#090F17" stroke="#354258"/><text x="143" y="668" fill="#E9EEF4" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="550">Asia Pacific</text><text x="125" y="704" fill="#9DA9B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" font-weight="700">KNOWN ACCOUNT CONTEXT</text><rect x="125" y="715" width="375" height="98" rx="8" fill="#090F17" stroke="#354258"/><text x="143" y="743" fill="#B7C1CE" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12"><tspan x="143">Inference traffic is growing, GPU utilization is</tspan><tspan x="143" dy="18">inconsistent, and procurement requires a three-year</tspan><tspan x="143" dy="18">TCO case.</tspan></text><rect x="125" y="808" width="375" height="48" rx="8" fill="url(#accent)"/><text x="312.5" y="839" fill="#071005" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="900" text-anchor="middle">GENERATE ACCOUNT INTELLIGENCE</text><text x="580" y="320" fill="#8EDC3B" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="800">OUTPUT</text><text x="580" y="352" fill="#F5F7FA" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="26" font-weight="800">NVIDIA</text><rect x="694" y="329" width="55" height="28" rx="14" fill="#172331" stroke="#354258"/><text x="721.5" y="348" fill="#C8D2DE" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="800" text-anchor="middle">NVDA</text><text x="580" y="376" fill="#9DA9B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">GPU Compute &amp; Accelerated Platforms · Enterprise · Asia Pacific</text><rect x="580" y="400" width="895" height="82" rx="10" fill="#141E2B" stroke="#2A374A"/><text x="600" y="425" fill="#8EDC3B" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" font-weight="800">COMMERCIAL THESIS</text><text x="600" y="450" fill="#E1E7EE" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13"><tspan x="600">Connect accelerated compute to measurable workload economics and delivery constraints—not product features—then validate the strongest</tspan><tspan x="600" dy="18">hypothesis in a bounded production-like PoC.</tspan></text><text x="580" y="520" fill="#8EDC3B" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="800">OPPORTUNITY HYPOTHESES</text><rect x="580" y="540" width="280" height="135" rx="10" fill="#141E2B" stroke="#2A374A"/><text x="598" y="565" fill="#8EDC3B" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="800">01</text><text x="598" y="590" fill="#F5F7FA" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="750">GPU-cluster expansion</text><text x="598" y="615" fill="#AEB9C6" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11"><tspan x="598">Raise utilization for foundation-model</tspan><tspan x="598" dy="16">training.</tspan></text><text x="598" y="656" fill="#DCE5EE" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="650">Measure: cost per training run</text><rect x="875" y="540" width="280" height="135" rx="10" fill="#141E2B" stroke="#2A374A"/><text x="893" y="565" fill="#8EDC3B" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="800">02</text><text x="893" y="590" fill="#F5F7FA" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="750">Inference cost pressure</text><text x="893" y="615" fill="#AEB9C6" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11"><tspan x="893">Increase throughput without latency</tspan><tspan x="893" dy="16">regression.</tspan></text><text x="893" y="656" fill="#DCE5EE" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="650">Measure: cost per million tokens</text><rect x="1170" y="540" width="280" height="135" rx="10" fill="#141E2B" stroke="#2A374A"/><text x="1188" y="565" fill="#8EDC3B" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="800">03</text><text x="1188" y="590" fill="#F5F7FA" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="750">Network bottlenecks</text><text x="1188" y="615" fill="#AEB9C6" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11"><tspan x="1188">Reduce accelerator idle time during</tspan><tspan x="1188" dy="16">scale-out.</tspan></text><text x="1188" y="656" fill="#DCE5EE" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="650">Measure: revenue per GPU hour</text><text x="580" y="712" fill="#8EDC3B" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="800">BUYER MAP</text><rect x="580" y="730" width="205" height="48" rx="8" fill="#101824" stroke="#263244"/><text x="592" y="748" fill="#7F8D9E" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="8" font-weight="700">ECONOMIC BUYER</text><text x="592" y="767" fill="#EEF2F6" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="650">CIO / CTO</text><rect x="800" y="730" width="205" height="48" rx="8" fill="#101824" stroke="#263244"/><text x="812" y="748" fill="#7F8D9E" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="8" font-weight="700">TECHNICAL BUYER</text><text x="812" y="767" fill="#EEF2F6" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="650">VP Infrastructure</text><rect x="580" y="788" width="205" height="48" rx="8" fill="#101824" stroke="#263244"/><text x="592" y="806" fill="#7F8D9E" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="8" font-weight="700">CHAMPION</text><text x="592" y="825" fill="#EEF2F6" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="650">Head of AI Platform</text><rect x="800" y="788" width="205" height="48" rx="8" fill="#101824" stroke="#263244"/><text x="812" y="806" fill="#7F8D9E" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="8" font-weight="700">COMMERCIAL GATE</text><text x="812" y="825" fill="#EEF2F6" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="650">FinOps</text><text x="1030" y="712" fill="#8EDC3B" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="800">POC ACCEPTANCE CRITERIA</text><circle cx="1044" cy="737" r="10" fill="#1A2A1D" stroke="#4E7B29"/><text x="1044" y="741" fill="#AFFF70" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="7" font-weight="800" text-anchor="middle">01</text><text x="1062" y="741" fill="#DCE3EA" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="550">Utilization improves vs. agreed baseline</text><circle cx="1044" cy="769" r="10" fill="#1A2A1D" stroke="#4E7B29"/><text x="1044" y="773" fill="#AFFF70" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="7" font-weight="800" text-anchor="middle">02</text><text x="1062" y="773" fill="#DCE3EA" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="550">No latency or reliability regression</text><circle cx="1044" cy="801" r="10" fill="#1A2A1D" stroke="#4E7B29"/><text x="1044" y="805" fill="#AFFF70" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="7" font-weight="800" text-anchor="middle">03</text><text x="1062" y="805" fill="#DCE3EA" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="550">Unit economics documented with customer inputs</text><circle cx="1044" cy="833" r="10" fill="#1A2A1D" stroke="#4E7B29"/><text x="1044" y="837" fill="#AFFF70" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="7" font-weight="800" text-anchor="middle">04</text><text x="1062" y="837" fill="#DCE3EA" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="550">Production owner and decision date named</text><rect x="1030" y="862" width="415" height="1" fill="#263244"/><text x="1030" y="882" fill="#7F8D9E" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="8" font-weight="700">EVIDENCE</text><text x="1095" y="882" fill="#BCC7D3" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9">benchmark · cost model · architecture review · decision</text></g></svg>